{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Hop In</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
        }

        /* Full-screen background with a dark overlay for text readability */
        .splash-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), /* Dark overlay */
                url("{% static 'splash.png' %}"); /* Correct CSS syntax for background images */
                
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
            
        }
        
        /* Logo Styling */
        .logo {
            max-width: 400px;
            margin-bottom: 0px;
            /* Adds a subtle drop shadow to make the logo pop against the background */
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
           
        }

        /* Typography */
        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            color: #f0f0f0;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 40px;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        }

        /* CTA Button Styling */
        .cta-button {
            display: inline-block;
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px; /* Gives the pill shape */
            background: linear-gradient(90deg, #348AC7 0%, #74BD43 100%); /* Blue to Green gradient */
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 12px 20px rgba(0, 0, 0, 0.4);
            /* Slightly shift the gradient on hover */
            background: linear-gradient(90deg, #2b7bb5 0%, #63a837 100%); 
        }

        /* Mobile Responsiveness */
        @media (max-width: none) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.2rem;
            }
            .logo {
                max-width: none;
                width: 1000px;
                height: auto;
                transform: scale(1.2);
            }
            .cta-button {
                padding: 14px 40px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="splash-screen">
        <img src="{% static 'transparent_logo.png' %}" alt="Hop In Logo" class="logo">
        
        <h1>Welcome to Hop In.</h1>
        <p>Your journey, shared.</p>
        
        <a href="/rides" class="cta-button">Get Started</a>
    </div>

</body>
</html>
